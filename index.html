<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche Calc</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #000 0%, #111 100%);
  font-family: Arial;
}

/* iluminação vermelha Porsche */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,0,0,0.2), transparent);
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.3); opacity: 0.2; }
  100% { transform: scale(1); opacity: 0.6; }
}

.calculator {
  width: 320px;
  padding: 20px;
  border-radius: 25px;
  background: #0a0a0a;
  box-shadow: 0 0 40px rgba(255,0,0,0.3);
  z-index: 1;
}

/* topo */
.top-bar {
  display: flex;
  justify-content: space-between;
  color: red;
  margin-bottom: 10px;
  font-size: 14px;
}

.mode {
  color: #ff3c00;
  font-weight: bold;
}

/* display */
#display {
  color: red;
  font-size: 42px;
  text-align: right;
  margin-bottom: 15px;
  text-shadow: 0 0 10px red;
}

/* barra de "velocidade" */
.speed-bar {
  height: 5px;
  background: #111;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
}

.speed {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, red, orange);
  transition: 0.3s;
}

/* botões */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  background: #111;
  color: red;
  box-shadow: inset 0 0 10px rgba(255,0,0,0.2);
  transition: 0.15s;
}

button:active {
  transform: scale(0.85);
  box-shadow: 0 0 20px red;
}

.orange {
  background: #ff3c00;
  color: white;
  box-shadow: 0 0 10px #ff3c00;
}

.gray {
  background: #333;
  color: white;
}

.zero {
  grid-column: span 2;
  border-radius: 40px;
}
</style>
</head>

<body>

<div class="calculator">

  <div class="top-bar">
    <span>🏁 PORSCHE MODE</span>
    <span class="mode">SPORT+</span>
  </div>

  <div id="display">0</div>

  <div class="speed-bar">
    <div class="speed" id="speed"></div>
  </div>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">C</button>
    <button class="gray" onclick="deleteLast()">⌫</button>
    <button class="gray">%</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");
let speed = document.getElementById("speed");

// som de motor
function somMotor() {
  let audio = new Audio("https://www.soundjay.com/mechanical/sounds/car-accelerating-1.mp3");
  audio.volume = 0.2;
  audio.play();
}

// vibração
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(20);
}

// barra de velocidade
function atualizarVelocidade() {
  let tamanho = display.innerText.length * 10;
  if (tamanho > 100) tamanho = 100;
  speed.style.width = tamanho + "%";
}

// funções
function append(value) {
  vibrar();
  somMotor();
  if (display.innerText === "0") {
    display.innerText = value;
  } else {
    display.innerText += value;
  }
  atualizarVelocidade();
}

function clearDisplay() {
  vibrar();
  display.innerText = "0";
  atualizarVelocidade();
}

function deleteLast() {
  vibrar();
  display.innerText = display.innerText.slice(0, -1);
  if (display.innerText === "") display.innerText = "0";
  atualizarVelocidade();
}

function calculate() {
  vibrar();
  somMotor();
  try {
    display.innerText = eval(display.innerText);
  } catch {
    display.innerText = "Erro";
  }
  atualizarVelocidade();
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
