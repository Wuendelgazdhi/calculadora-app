<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche HUD Calc</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

/* tela de ignição */
.start-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

.start-btn {
  padding: 20px;
  border-radius: 50%;
  background: red;
  color: white;
  font-size: 18px;
  border: none;
  box-shadow: 0 0 20px red;
}

/* painel */
.panel {
  display: none;
  padding: 20px;
  max-width: 350px;
  margin: auto;
}

/* HUD */
.hud {
  display: flex;
  justify-content: space-between;
  color: red;
  font-size: 12px;
}

#speed {
  font-size: 40px;
  text-align: center;
  color: red;
}

#display {
  text-align: right;
  font-size: 30px;
  margin: 10px 0;
}

/* histórico */
.history {
  font-size: 12px;
  color: #aaa;
  height: 40px;
  overflow: hidden;
}

/* botões */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 55px;
  border-radius: 50%;
  border: none;
  background: #111;
  color: blue;
}

.orange { background: red; color: white; }
.gray { background: #333; color: white; }
.zero { grid-column: span 2; border-radius: 40px; }
</style>
</head>

<body>

<div class="start-screen" id="start">
  <h2>🚗 Porsche System</h2>
  <button class="start-btn" onclick="ligar()">START ENGINE</button>
</div>

<div class="panel" id="panel">

  <div class="hud">
    <span id="gear">P</span>
    <span id="time"></span>
  </div>

  <div id="speed">0 km/h</div>

  <div class="history" id="history"></div>
  <div id="display">0</div>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">C</button>
    <button class="gray" onclick="deleteLast()">⌫</button>
    <button class="gray" onclick="trocarMarcha()">⚙️</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
  </div>

</div>

<script>
let display = document.getElementById("display");
let speed = document.getElementById("speed");
let history = document.getElementById("history");
let gear = document.getElementById("gear");

let gears = ["P","R","N","D"];
let g = 0;

// ligar carro
function ligar() {
  document.getElementById("start").style.display = "none";
  document.getElementById("panel").style.display = "block";
  som();
}

// som motor
function som() {
  let a = new Audio("https://www.soundjay.com/mechanical/sounds/car-start-1.mp3");
  a.play();
}

// vibração
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(20);
}

// hora
setInterval(() => {
  let d = new Date();
  document.getElementById("time").innerText =
    d.getHours().toString().padStart(2,"0")+":"+
    d.getMinutes().toString().padStart(2,"0");
},1000);

// velocidade animada
function atualizarVelocidade() {
  let target = display.innerText.length * 10;
  let current = parseInt(speed.innerText);
  let interval = setInterval(() => {
    if (current >= target) return clearInterval(interval);
    current++;
    speed.innerText = current + " km/h";
  }, 5);
}

// funções calc
function append(v) {
  vibrar();
  display.innerText = display.innerText === "0" ? v : display.innerText + v;
  atualizarVelocidade();
}

function clearDisplay() {
  display.innerText = "0";
  atualizarVelocidade();
}

function deleteLast() {
  display.innerText = display.innerText.slice(0,-1)||"0";
  atualizarVelocidade();
}

function calculate() {
  try {
    let res = eval(display.innerText);
    history.innerText = display.innerText + " = " + res;
    display.innerText = res;
  } catch {
    display.innerText = "Erro";
  }
  atualizarVelocidade();
}

// marcha
function trocarMarcha() {
  g = (g+1)%gears.length;
  gear.innerText = gears[g];
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
