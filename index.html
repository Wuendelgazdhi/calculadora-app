<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarCalc</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  font-family: 'Arial';
}

/* Painel estilo carro */
.calculator {
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  background: #0a0a0a;
  box-shadow: 0 0 30px rgba(0,255,150,0.2);
}

/* Display estilo velocímetro */
#display {
  color: #00ff9d;
  font-size: 42px;
  text-align: right;
  margin-bottom: 20px;
  text-shadow: 0 0 10px #00ff9d;
}

/* Grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Botões */
button {
  height: 60px;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  background: #111;
  color: #00ff9d;
  box-shadow: inset 0 0 10px rgba(0,255,150,0.2);
  transition: 0.15s;
}

button:active {
  transform: scale(0.85);
  box-shadow: 0 0 15px #00ff9d;
}

/* Botões especiais */
.orange {
  background: #ff3c00;
  color: white;
  box-shadow: 0 0 10px #ff3c00;
}

.gray {
  background: #333;
  color: white;
}

.zero {
  grid-column: span 2;
  border-radius: 40px;
}

/* Top bar estilo carro */
.top-bar {
  display: flex;
  justify-content: space-between;
  color: #00ff9d;
  margin-bottom: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="calculator">

  <div class="top-bar">
    <span>🚗 CAR MODE</span>
    <span id="time"></span>
  </div>

  <div id="display">0</div>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">C</button>
    <button class="gray" onclick="deleteLast()">⌫</button>
    <button class="gray">%</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

// relógio estilo painel
function atualizarHora() {
  let agora = new Date();
  document.getElementById("time").innerText =
    agora.getHours().toString().padStart(2, '0') + ":" +
    agora.getMinutes().toString().padStart(2, '0');
}
setInterval(atualizarHora, 1000);

// vibração
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(30);
}

// funções
function append(value) {
  vibrar();
  if (display.innerText === "0") {
    display.innerText = value;
  } else {
    display.innerText += value;
  }
}

function clearDisplay() {
  vibrar();
  display.innerText = "0";
}

function deleteLast() {
  vibrar();
  display.innerText = display.innerText.slice(0, -1);
  if (display.innerText === "") display.innerText = "0";
}

function calculate() {
  vibrar();
  try {
    display.innerText = eval(display.innerText);
  } catch {
    display.innerText = "Erro";
  }
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
