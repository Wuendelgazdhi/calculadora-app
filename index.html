<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  transition: 0.3s;
}

.calculator {
  width: 300px;
  padding: 20px;
}

#display {
  color: white;
  font-size: 48px;
  text-align: right;
  margin-bottom: 20px;
  min-height: 60px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 50%;
  font-size: 22px;
  background: #333;
  color: white;
  cursor: pointer;
  transition: all 0.1s ease;
}

button:active {
  transform: scale(0.85);
  opacity: 0.6;
}

.gray { background: #a5a5a5; color: black; }
.orange { background: #ff9500; }

.zero {
  grid-column: span 2;
  border-radius: 40px;
}

/* Tema claro */
.light {
  background: #f1f1f1;
}

.light #display {
  color: black;
}

.light button {
  background: #ddd;
  color: black;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.toggle {
  background: none;
  color: white;
  font-size: 18px;
}

.light .toggle {
  color: black;
}
</style>
</head>

<body>

<div class="calculator">

  <div class="top-bar">
    <button class="toggle" onclick="toggleTheme()">🌗</button>
  </div>

  <div id="display">0</div>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">C</button>
    <button class="gray" onclick="deleteLast()">⌫</button>
    <button class="gray">%</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

// vibração
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(30);
}

// adicionar número
function append(value) {
  vibrar();
  if (display.innerText === "0") {
    display.innerText = value;
  } else {
    display.innerText += value;
  }
}

// limpar
function clearDisplay() {
  vibrar();
  display.innerText = "0";
}

// apagar
function deleteLast() {
  vibrar();
  display.innerText = display.innerText.slice(0, -1);
  if (display.innerText === "") display.innerText = "0";
}

// calcular
function calculate() {
  vibrar();
  try {
    display.innerText = eval(display.innerText);
  } catch {
    display.innerText = "Erro";
  }
}

// tema
function toggleTheme() {
  document.body.classList.toggle("light");
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
